<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>OG Social Card – Vishnu P.S.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .card {
      width: 1200px;
      height: 630px;
      background: #08080a;
      position: relative;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .orb-tr {
      position: absolute;
      top: -180px;
      right: -180px;
      width: 560px;
      height: 560px;
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(255, 90, 60, 0.55) 0%, rgba(255, 90, 60, 0.18) 50%, transparent 75%);
      filter: blur(40px);
      pointer-events: none;
    }

    .orb-bl {
      position: absolute;
      bottom: -160px;
      left: -160px;
      width: 440px;
      height: 440px;
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(255, 90, 60, 0.20) 0%, transparent 70%);
      filter: blur(50px);
      pointer-events: none;
    }

    .accent-bar {
      position: absolute;
      left: 72px;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, transparent 5%, #ff5a3c 30%, #ff5a3c 70%, transparent 95%);
      border-radius: 2px;
    }

    .content {
      position: relative;
      z-index: 10;
      padding-left: 112px;
      padding-right: 80px;
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .monogram {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 76px;
      height: 76px;
      border-radius: 18px;
      background: #0f0f12;
      border: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 32px;
      flex-shrink: 0;
      position: relative;
    }

    .monogram .v {
      font-family: 'Fraunces', 'Times New Roman', serif;
      font-weight: 500;
      font-size: 50px;
      color: #ffffff;
      line-height: 1;
      transform: translateY(2px);
    }

    .monogram .dot {
      position: absolute;
      bottom: 14px;
      right: 14px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ff5a3c;
    }

    .headline {
      font-family: 'Fraunces', 'Times New Roman', serif;
      font-size: 96px;
      font-weight: 500;
      line-height: 1.0;
      letter-spacing: -2px;
      color: #ffffff;
      margin-bottom: 24px;
    }

    .headline .dot {
      color: #ff5a3c;
    }

    .subtitle {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 26px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.72);
      letter-spacing: 0.2px;
      margin-bottom: 44px;
    }

    .subtitle .sep {
      color: #ff5a3c;
      margin: 0 14px;
      font-weight: 600;
    }

    .url {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 22px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.5px;
    }

    .grid-lines {
      position: absolute;
      right: 0;
      top: 0;
      width: 380px;
      height: 100%;
      opacity: 0.05;
      background-image:
        linear-gradient(to right, #ffffff 1px, transparent 1px),
        linear-gradient(to bottom, #ffffff 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: linear-gradient(to left, #000 0%, transparent 100%);
      -webkit-mask-image: linear-gradient(to left, #000 0%, transparent 100%);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="orb-tr"></div>
    <div class="orb-bl"></div>
    <div class="accent-bar"></div>
    <div class="grid-lines"></div>

    <div class="content">
      <div class="monogram">
        <span class="v">V</span>
        <span class="dot"></span>
      </div>

      <div class="headline">Vishnu P.S<span class="dot">.</span></div>
      <div class="subtitle">AI Engineer<span class="sep">·</span>LLMs<span class="sep">·</span>RAG<span class="sep">·</span>Agents<span class="sep">·</span>MLOps</div>
      <div class="url">vishnups.com</div>
    </div>
  </div>
</body>
</html>
