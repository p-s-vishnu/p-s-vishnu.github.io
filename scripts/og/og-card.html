<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <title>OG Social Card – Vishnu P.S.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .card {
      width: 1200px;
      height: 630px;
      background: #050714;
      position: relative;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    /* Indigo gradient orb – top right */
    .orb-tr {
      position: absolute;
      top: -160px;
      right: -160px;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle at center, #3B82F6cc 0%, #1E40AF55 55%, transparent 75%);
      filter: blur(30px);
      pointer-events: none;
    }

    /* Faint orb – bottom left */
    .orb-bl {
      position: absolute;
      bottom: -120px;
      left: -120px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle at center, #3B82F633 0%, transparent 70%);
      filter: blur(40px);
      pointer-events: none;
    }

    /* Left accent bar */
    .accent-bar {
      position: absolute;
      left: 72px;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(to bottom, transparent 5%, #3B82F6 30%, #67E8F9 70%, transparent 95%);
      border-radius: 2px;
    }

    /* Content area */
    .content {
      position: relative;
      z-index: 10;
      padding-left: 108px;
      padding-right: 80px;
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 100%;
    }

    .monogram {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 68px;
      height: 68px;
      border-radius: 18px;
      background: linear-gradient(135deg, #3B82F6 0%, #1E40AF 100%);
      margin-bottom: 28px;
      flex-shrink: 0;
    }

    .monogram svg {
      width: 40px;
      height: 40px;
    }

    .headline {
      font-size: 80px;
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #ffffff 0%, #93C5FD 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 18px;
    }

    .subtitle {
      font-size: 26px;
      font-weight: 600;
      color: #67E8F9;
      letter-spacing: 0.5px;
      margin-bottom: 40px;
    }

    .url {
      font-size: 22px;
      font-weight: 400;
      color: #6B7280;
      letter-spacing: 1px;
    }

    /* Grid lines decorative */
    .grid-lines {
      position: absolute;
      right: 0;
      top: 0;
      width: 380px;
      height: 100%;
      opacity: 0.06;
      background-image:
        linear-gradient(to right, #67E8F9 1px, transparent 1px),
        linear-gradient(to bottom, #67E8F9 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: linear-gradient(to left, #000 0%, transparent 100%);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="orb-tr"></div>
    <div class="orb-bl"></div>
    <div class="accent-bar"></div>
    <div class="grid-lines"></div>

    <div class="content">
      <div class="monogram">
        <!-- Stylised "V" monogram -->
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text
            x="20" y="30"
            text-anchor="middle"
            font-family="Inter, system-ui, sans-serif"
            font-size="30"
            font-weight="800"
            fill="white"
            letter-spacing="-1">V</text>
        </svg>
      </div>

      <div class="headline">Vishnu P.S.</div>
      <div class="subtitle">AI Engineer &nbsp;·&nbsp; LLMs &nbsp;·&nbsp; RAG &nbsp;·&nbsp; Agents &nbsp;·&nbsp; MLOps</div>
      <div class="url">vishnups.com</div>
    </div>
  </div>
</body>
</html>
